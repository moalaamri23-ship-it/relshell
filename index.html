<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f172a">
  <title>Reliability Shell</title>
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          },
          colors: {
            slate: {
              850: '#1e293b',
              900: '#0f172a',
              950: '#020617'
            },
            brand: {
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8'
            }
          }
        }
      }
    }
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; background-color: #f8fafc; color: #334155; }

    /* Thin scrollbar — matches fmeca-studio */
    .scroll-thin::-webkit-scrollbar { width: 8px; height: 8px; }
    .scroll-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    .scroll-thin::-webkit-scrollbar-track { background: transparent; }

    /* Entry animation — matches fmeca-studio */
    .animate-enter         { animation: fadeIn 0.3s ease-out both; }
    .animate-enter-delay-1 { animation: fadeIn 0.3s 0.05s ease-out both; }
    .animate-enter-delay-2 { animation: fadeIn 0.3s 0.10s ease-out both; }
    .animate-enter-delay-3 { animation: fadeIn 0.3s 0.15s ease-out both; }
    .animate-enter-delay-4 { animation: fadeIn 0.3s 0.20s ease-out both; }
    .animate-enter-delay-5 { animation: fadeIn 0.3s 0.25s ease-out both; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
